    emailBody:"Dear Tripadvisor,\n\nWe received a fraud penalty letter stating our property Hilltop Resort & Spa (ID: 9912345) has been penalized for review manipulation. Our bubble rating has been reduced and a red penalty badge is showing.\n\nWe have been in business for 20 years and never engaged in fraud. We have hired a lawyer and will take legal action if this is not resolved.\n\nMaria Garcia",
    agentSig:"Best regards,\n\nAnjali\n\nTripadvisor Support Team", ticketType:"owner",
    question:"The owner received a fraud penalty letter and is threatening legal action. After verification, what is the correct approach?",
    options:["Remove the penalty immediately due to legal threat","Follow fraud letter protocol — document the response, do NOT remove penalty based on threats, and guide the owner through the formal appeal process","Transfer the ticket to the legal department","Ignore the legal threat and close the ticket"],
    correctIndex:1, explanation:"Fraud letter responses follow a strict protocol. Penalties cannot be removed based on threats or claims alone. Guide the owner through the formal appeal process." }
];

/* ---- state ---- */
const store = {
  get(){ try { return JSON.parse(localStorage.getItem("fs_participants")) || []; } catch { return []; } },
  set(v){ try { localStorage.setItem("fs_participants", JSON.stringify(v)); } catch {} }
};
let state = {
  screen: "login",
  user: { name:"", empId:"", country:"", trainer:"" },
  showAdmin: false, adminPw:"", adminErr:"",
  qi: 0, score: 0, selected: null, answered: false, answers: [], timer: 0,
  timerId: null
};
const pad = n => String(n).padStart(2,"0");
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---- timer ---- */
function startTimer(){ stopTimer(); state.timerId = setInterval(()=>{ state.timer++; const el=document.getElementById("timer"); if(el) el.textContent = "⏱ "+pad(Math.floor(state.timer/60))+":"+pad(state.timer%60); },1000); }
function stopTimer(){ if(state.timerId){ clearInterval(state.timerId); state.timerId=null; } }

/* ---- navigation ---- */
function go(screen){ state.screen = screen; render(); }

function handleLogin(){
  const u = state.user;
  if(!u.name.trim()||!u.empId.trim()||!u.country.trim()||!u.trainer.trim()){
    document.getElementById("login-err").textContent = "Please fill in all fields.";
    return;
  }
  go("instructions");
}
function handleAdmin(){
  if(state.adminPw === ADMIN_PASSWORD){ state.showAdmin=false; state.adminPw=""; state.adminErr=""; go("admin"); }
  else { state.adminErr="Incorrect password"; render(); }
}
function startQuiz(){
  state.qi=0; state.score=0; state.selected=null; state.answered=false; state.answers=[]; state.timer=0;
  go("quiz"); startTimer();
}
function selectOption(i){ if(state.answered) return; state.selected=i; render(); }
function submitAnswer(){
  if(state.selected===null||state.answered) return;
  stopTimer();
  const q = QUESTIONS[state.qi];
  const correct = state.selected===q.correctIndex;
  if(correct) state.score++;
  state.answered=true;
  state.answers.push({ qIndex: state.qi, selected: state.selected, correct, time: state.timer });
  render();
}
function nextQuestion(){
  if(state.qi < QUESTIONS.length-1){
    state.qi++; state.selected=null; state.answered=false; state.timer=0;
    render(); startTimer();
  } else {
    const list = store.get();
    list.push({ ...state.user, score: state.score, total: QUESTIONS.length,
      pct: Math.round((state.score/QUESTIONS.length)*100), date: new Date().toLocaleString() });
    store.set(list);
    go("result");
  }
}
function clearAdmin(){ if(confirm("Clear all records?")){ store.set([]); render(); } }
function newSession(){ state.user={name:"",empId:"",country:"",trainer:""}; go("login"); }

function downloadCert(){
  const pct = Math.round((state.score/QUESTIONS.length)*100);
  const grade = pct>=90?"Outstanding":pct>=70?"Good":pct>=50?"Satisfactory":"Needs Improvement";
  const u = state.user;
  const svg = '<?xml version="1.0" encoding="UTF-8"?>'+
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 566" width="800" height="566">'+
  '<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f4c75"/><stop offset="100%" stop-color="#1b262c"/></linearGradient></defs>'+
  '<rect width="800" height="566" fill="url(#bg)" rx="12"/>'+

  '<text x="400" y="70" text-anchor="middle" fill="#bbe1fa" font-family="Georgia,serif" font-size="14" letter-spacing="6">TRIPADVISOR FRAUD SUPPORT</text>'+

  '<text x="400" y="180" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="14">This is to certify that</text>'+
  '<text x="400" y="220" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="28" font-weight="bold">'+esc(u.name)+'</text>'+
  '<text x="400" y="250" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="13">Employee ID: '+esc(u.empId)+'  |  Country: '+esc(u.country)+'</text>'+
  '<text x="400" y="290" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="14">has successfully completed the</text>'+
  '<text x="400" y="320" text-anchor="middle" fill="#3282b8" font-family="Georgia,serif" font-size="20" font-weight="bold">Fraud Support Zendesk Simulation Assessment</text>'+
  '<text x="400" y="370" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="42" font-weight="bold">'+state.score+'/'+QUESTIONS.length+'</text>'+
  '<text x="400" y="400" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="16">Score: '+pct+'% — '+grade+'</text>'+
  '<line x1="200" y1="430" x2="600" y2="430" stroke="#3282b8" stroke-width="1" opacity=".5"/>'+
  '<text x="200" y="470" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="12">Trainer: '+esc(u.trainer)+'</text>'+
  '<text x="400" y="470" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="12">Date: '+new Date().toLocaleDateString()+'</text>'+
  '<text x="600" y="470" text-anchor="middle" fill="#bbe1fa" font-family="Arial,sans-serif" font-size="12">Sutherland</text>'+
  '<text x="400" y="520" text-anchor="middle" fill="#3282b8" font-family="Georgia,serif" font-size="11" font-style="italic">Fraud Support Training Program — Powered by Sutherland</text>'+
  '</svg>';
  const blob = new Blob([svg], { type:"image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "FraudSupport_Certificate_"+u.name.replace(/\s/g,"_")+".svg";
  a.click(); URL.revokeObjectURL(url);
}

/* ---- input binding ---- */
function bindInput(id, key){
  const el = document.getElementById(id);
  if(el) el.addEventListener("input", e => { state.user[key] = e.target.value; });
}

/* ---- header ---- */
function header(sub, right){
  return '<header><div class="logo"><div class="logo-icon">FS</div><div><div class="logo-text">Fraud Support Simulator<span class="logo-sub"> — '+sub+'</span></div></div></div>'+(right||'')+'</header>';
}

/* ---- renderers ---- */
function renderLogin(){
  return header("Tripadvisor", '<button class="btn-outline" onclick="state.showAdmin=true;render()">Admin</button>')+
  '<div class="center"><div class="card"><div class="tcenter" style="margin-bottom:24px">'+
  '<div class="head-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z" fill="#fff"/></svg></div>'+
  '<h2 class="head-title">Agent Login</h2><p class="head-sub">Enter your details to begin the assessment</p></div>'+
  '<div class="form-stack">'+
  '<div class="field"><label class="lbl">Employee Name *</label><input class="inp" id="in-name" placeholder="Enter full name" value="'+esc(state.user.name)+'"></div>'+
  '<div class="field"><label class="lbl">Employee ID *</label><input class="inp" id="in-empId" placeholder="e.g. EMP10234" value="'+esc(state.user.empId)+'"></div>'+
  '<div class="field"><label class="lbl">Country *</label><input class="inp" id="in-country" placeholder="e.g. India" value="'+esc(state.user.country)+'"></div>'+
  '<div class="field"><label class="lbl">Trainer Name *</label><input class="inp" id="in-trainer" placeholder="Enter trainer\'s name" value="'+esc(state.user.trainer)+'"></div>'+

}
function adminModal(){
  return '<div class="overlay" onclick="state.showAdmin=false;state.adminPw=\'\';state.adminErr=\'\';render()">'+
  '<div class="card" style="max-width:360px" onclick="event.stopPropagation()">'+
  '<h3 style="margin-bottom:16px;font-size:18px;font-weight:700">Admin Access</h3>'+
  '<label class="lbl">Password</label>'+
  '<input type="password" class="inp" id="admin-pw" style="margin-bottom:8px" placeholder="Enter admin password" value="'+esc(state.adminPw)+'">'+
  (state.adminErr ? '<p class="err">'+esc(state.adminErr)+'</p>' : '')+
  '<button class="btn-primary" style="margin-top:8px" onclick="handleAdmin()">Login</button>'+
  '</div></div>';
}
function renderAdmin(){
  const list = store.get();
  let rows;
  if(list.length===0){ rows = '<div class="card empty" style="max-width:100%">No participants yet</div>'; }
  else {
    rows = '<div class="scroll-x"><table><thead><tr>'+
      ["#","Name","Emp ID","Country","Trainer","Score","%","Date"].map(h=>'<th>'+h+'</th>').join('')+
      '</tr></thead><tbody>'+
      list.map((p,i)=>{
        const bg = p.pct>=70?"#dcfce7":p.pct>=50?"#fef9c3":"#fee2e2";
        const col = p.pct>=70?"#166534":p.pct>=50?"#854d0e":"#991b1b";
        return '<tr><td style="color:#64748b">'+(i+1)+'</td><td style="font-weight:600">'+esc(p.name)+'</td>'+
          '<td>'+esc(p.empId)+'</td><td>'+esc(p.country)+'</td><td>'+esc(p.trainer)+'</td>'+
          '<td style="font-weight:700">'+p.score+'/'+p.total+'</td>'+
          '<td><span class="score-pill" style="background:'+bg+';color:'+col+'">'+p.pct+'%</span></td>'+
          '<td style="color:#94a3b8;white-space:nowrap">'+esc(p.date)+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  }
  return header("Admin Panel", '<button class="btn-outline" onclick="go(\'login\')">← Back to Login</button>')+
  '<div class="admin-wrap"><div class="admin-top"><h2 style="font-size:22px">Participant Records</h2>'+
  '<div style="display:flex;gap:8px"><span class="pill">Total: '+list.length+'</span>'+
  (list.length>0?'<button class="btn-outline btn-danger" onclick="clearAdmin()">Clear All</button>':'')+
  '</div></div>'+rows+'</div>';
}
function renderInstructions(){
  const rules = ["Each correct answer scores 1 point (max 10).","Once submitted, answers cannot be changed.","Each question has a timer — manage your time.","Owner tickets always require verification via Owner Tool (OT) first.","Review disputes from owners must be escalated to T2.","Read the full email and tags before answering.","A certificate will be generated at the end with your score."];
  return header("Tripadvisor", '<span style="font-size:13px;color:#64748b">Welcome, '+esc(state.user.name)+'</span>')+
  '<div class="center"><div class="card wide"><div class="tcenter" style="margin-bottom:24px">'+
  '<div class="head-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="#fff"/></svg></div>'+
  '<h2 class="head-title" style="font-size:24px">Assessment Instructions</h2><p class="head-sub">Read carefully before starting</p></div>'+
  '<div class="info-box"><h3>How It Works</h3><div class="txt">You\'ll work through <strong>10 Zendesk-style support tickets</strong> that simulate real Fraud Support scenarios. Each ticket shows the requester panel, email thread, tags, and requester info — just like the real Zendesk tool.<br><br>For each ticket, choose the <strong>correct action</strong>. After you submit, you\'ll see if it was right or wrong with an explanation before moving on.</div></div>'+
  '<div class="rules-box"><h3>Rules</h3>'+
  rules.map((r,i)=>'<div class="rule"><span class="rule-num">'+(i+1)+'</span><span>'+r+'</span></div>').join('')+
  '</div><div class="row-gap"><button class="btn-outline" style="flex:1" onclick="go(\'login\')">← Back</button>'+
  '<button class="btn-primary" style="flex:2" onclick="startQuiz()">Start Assessment →</button></div>'+
  '</div></div>';
}
function renderQuiz(){
  const q = QUESTIONS[state.qi];
  const progress = ((state.qi + (state.answered?1:0))/QUESTIONS.length)*100;
  const firstName = q.requesterName.split(" ")[0].toLowerCase();

  const tags = q.tags.map(t=>'<span class="tag">'+esc(t)+' <span class="x">×</span></span>').join('');
  const typeBadge = q.ticketType==="owner"
    ? '<span class="type-badge type-owner">OWNER TICKET</span>'
    : '<span class="type-badge type-user">USER TICKET</span>';
  const internalNote = q.internalNote
    ? '<div class="internal-note"><strong>🔒 Internal Note:</strong> '+esc(q.internalNote)+'</div>' : '';

  const options = q.options.map((opt,i)=>{
    let cls = "option", chip = "chip";
    if(state.answered){
      cls += " locked";
      if(i===q.correctIndex){ cls+=" correct"; chip+=" cor"; }
      else if(i===state.selected){ cls+=" wrong"; chip+=" wr"; }
    } else if(i===state.selected){ cls+=" selected"; chip+=" sel"; }
    return '<div class="'+cls+'" onclick="selectOption('+i+')"><span class="'+chip+'">'+String.fromCharCode(65+i)+'</span><span class="opt-text">'+esc(opt)+'</span></div>';
  }).join('');

  const explain = state.answered
    ? '<div class="explain '+(state.selected===q.correctIndex?'good':'bad')+'"><strong style="color:'+(state.selected===q.correctIndex?'#166534':'#991b1b')+'">'+(state.selected===q.correctIndex?'✓ Correct!':'✗ Incorrect')+'</strong><span style="color:#475569"> — '+esc(q.explanation)+'</span></div>'
    : '';

  const actionBtn = state.answered
    ? '<button class="btn-primary auto" onclick="nextQuestion()">'+(state.qi<QUESTIONS.length-1?'Next Question →':'View Results →')+'</button>'
    : '<button class="btn-primary auto" '+(state.selected===null?'disabled':'')+' onclick="submitAnswer()">Submit Answer</button>';

  return header("Zendesk Simulation",
    '<div style="display:flex;align-items:center;gap:16px"><span style="font-size:13px;color:#64748b">Q'+(state.qi+1)+'/'+QUESTIONS.length+' · Score: <strong style="color:#0f4c75">'+state.score+'</strong></span>'+
    '<span class="timer" id="timer">⏱ '+pad(Math.floor(state.timer/60))+':'+pad(state.timer%60)+'</span></div>')+
  '<div class="progress"><div style="width:'+progress+'%"></div></div>'+
  '<div class="quiz-wrap">'+
    '<div class="ticket">'+
      '<div class="tk-tabbar"><span style="font-weight:700;color:#fff">Support</span>'+
        '<span class="tk-tab"><svg width="14" height="14" fill="#9ca3af" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'+
        'Request from: '+esc(firstName)+'... <span style="color:#9ca3af">'+esc(q.ticketId)+'</span></span></div>'+
      '<div class="tk-orgrow"><span class="meta-txt">Organization (create) · <strong>'+esc(q.requester)+'</strong></span>'+
        '<span class="badge-open">Open</span><span style="font-size:13px;color:#334155">Question #'+q.id+'</span></div>'+
      '<div class="tk-body">'+
        '<div class="tk-left">'+
          '<div class="side-group"><label class="side-lbl">Requester</label><div class="side-box"><span class="val">👤 '+esc(q.requester)+'</span><span style="color:#9ca3af">▾</span></div></div>'+
          '<div class="side-group"><label class="side-lbl">Assignee* <span class="take-it">take it</span></label><div class="side-box"><span class="val">👤 '+esc(q.assignee)+'</span><span style="color:#9ca3af">▾</span></div></div>'+
          '<div class="side-group"><label class="side-lbl">Form</label><div class="side-box"><span>'+esc(q.form)+'</span><span style="color:#9ca3af">▾</span></div></div>'+
          '<div class="side-group"><label class="side-lbl">Tags</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+tags+'</div>'+
            '<div style="margin-top:10px">'+typeBadge+'</div></div>'+
        '</div>'+
        '<div class="tk-center">'+
          '<div class="req-title">Request from: '+esc(q.requester)+'</div>'+
          '<div class="refid">'+esc(q.refId)+'</div>'+
          '<div class="meta-row"><span class="meta-27">-27m</span><span class="meta-txt">Via email</span><span class="meta-txt">Topic: <span style="color:#3282b8">'+esc(q.topic)+'</span></span></div>'+
          '<div class="see-oldest"><span>↑ See oldest</span></div>'+
          '<div class="msg"><div class="msg-head"><span class="avatar">'+esc(q.requesterName[0])+'</span><span style="font-weight:600;font-size:13px">'+esc(q.requesterName)+'</span></div>'+esc(q.emailBody)+'</div>'+
          '<div class="agent-sig">'+esc(q.agentSig)+'</div>'+
          internalNote+
        '</div>'+
        '<div class="tk-right">'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><span style="width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px">👤</span><strong style="font-size:13px" class="val">'+esc(q.requesterName)+'</strong></div>'+
          '<div class="r-item"><div class="r-lbl">Email</div><div class="r-val">'+esc(q.requester)+'</div></div>'+
          '<div class="r-item"><div class="r-lbl">Local time</div><div class="r-val">'+esc(q.localTime)+'</div></div>'+
          '<div class="r-item"><div class="r-lbl">Language</div><div class="r-val">'+esc(q.language)+'</div></div>'+
          '<div><div class="r-lbl">Notes</div><div class="notes-box">Add user notes</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="tk-bottom"><span style="font-size:12px;color:#64748b">📋 Apply macro ▾</span><span class="submit-btn">Submit as Open ▾</span></div>'+
    '</div>'+
    '<div class="qcard"><h3 class="qtitle"><span class="qnum">Question '+(state.qi+1)+' — </span>'+esc(q.question)+'</h3>'+
      '<div class="options">'+options+'</div>'+explain+
      '<div class="q-actions">'+actionBtn+'</div>'+
    '</div>'+
  '</div>';
}
function renderResult(){
  const pct = Math.round((state.score/QUESTIONS.length)*100);
  const grade = pct>=90?"Outstanding":pct>=70?"Good":pct>=50?"Satisfactory":"Needs Improvement";
  const gCol = pct>=70?"#166534":pct>=50?"#854d0e":"#991b1b";
  const gBg = pct>=70?"#dcfce7":pct>=50?"#fef9c3":"#fee2e2";
  const u = state.user;
  const breakdown = state.answers.map((a,i)=>
    '<div class="b-item" style="background:'+(a.correct?'#f0fdf4':'#fef2f2')+'"><span style="font-weight:600">Q'+(i+1)+': '+esc(QUESTIONS[i].topic)+'</span><span style="font-weight:700;color:'+(a.correct?'#22c55e':'#ef4444')+'">'+(a.correct?'✓':'✗')+'</span></div>'
  ).join('');
  return header("Assessment Complete", '')+
  '<div style="padding:32px 16px;max-width:640px;margin:0 auto"><div class="card tcenter" style="max-width:100%;padding:40px">'+
    '<div class="result-circle" style="background:'+gBg+';color:'+gCol+'">'+state.score+'</div>'+
    '<p style="font-size:14px;color:#64748b;margin-bottom:4px">out of '+QUESTIONS.length+'</p>'+
    '<span class="grade-pill" style="background:'+gBg+';color:'+gCol+'">'+grade+' — '+pct+'%</span>'+
    '<div class="detail-box"><div class="detail-grid">'+
      '<div><span style="color:#94a3b8">Name:</span> <strong>'+esc(u.name)+'</strong></div>'+
      '<div><span style="color:#94a3b8">Emp ID:</span> <strong>'+esc(u.empId)+'</strong></div>'+
      '<div><span style="color:#94a3b8">Country:</span> <strong>'+esc(u.country)+'</strong></div>'+
      '<div><span style="color:#94a3b8">Trainer:</span> <strong>'+esc(u.trainer)+'</strong></div>'+
    '</div></div>'+
    '<div class="breakdown"><h4>Answer Breakdown</h4>'+breakdown+'</div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
      '<button class="btn-primary" style="flex:1;min-width:180px" onclick="downloadCert()">Download Certificate</button>'+
      '<button class="btn-outline" style="flex:1;min-width:140px" onclick="newSession()">New Session</button>'+
    '</div>'+
  '</div></div>';
}

/* ---- main render ---- */
function render(){
  const app = document.getElementById("app");
  let html = "";
  if(state.screen==="login") html = renderLogin();
  else if(state.screen==="admin") html = renderAdmin();
  else if(state.screen==="instructions") html = renderInstructions();
  else if(state.screen==="quiz") html = renderQuiz();
  else if(state.screen==="result") html = renderResult();
  app.innerHTML = html;

  /* bind inputs after render */
  if(state.screen==="login"){
    bindInput("in-name","name"); bindInput("in-empId","empId");
    bindInput("in-country","country"); bindInput("in-trainer","trainer");
    const t = document.getElementById("in-trainer");
    if(t) t.addEventListener("keydown", e=>{ if(e.key==="Enter") handleLogin(); });
    const pw = document.getElementById("admin-pw");
    if(pw){ pw.addEventListener("input", e=>{ state.adminPw=e.target.value; }); pw.addEventListener("keydown", e=>{ if(e.key==="Enter") handleAdmin(); }); pw.focus(); }
  }
}

render();
</script>
